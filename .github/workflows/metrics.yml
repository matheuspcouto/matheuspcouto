name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Executa todo dia à meia-noite
  workflow_dispatch: # Permite execução manual
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: matheuspcouto
          template: classic
          base: activity
          config_timezone: America/Sao_Paulo

          filename: github-metrics-stats.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics stats [skip ci]"

      - name: Contributions Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: matheuspcouto
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          config_padding: 10

          plugin_calendar: yes
          plugin_calendar_limit: 1

          filename: github-metrics-activity.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update metrics activity [skip ci]"
